<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Travel Planner</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Configuration -->
        <aside class="sidebar glass-panel">
            <div class="logo">
                <i class="fa-solid fa-plane-departure brand-icon"></i>
                <h1>Smart Planner</h1>
            </div>
            
            <form id="planner-form">
                <div class="form-group">
                    <label for="start_address"><i class="fa-solid fa-location-dot"></i> Start Address</label>
                    <input type="text" id="start_address" placeholder="e.g. 400 Broad St, Seattle, WA 98109" value="400 Broad St, Seattle, WA 98109" required>
                </div>
                
                <div class="form-group">
                    <label for="end_address"><i class="fa-solid fa-flag-checkered"></i> End Address</label>
                    <input type="text" id="end_address" placeholder="e.g. 85 Pike St, Seattle, WA 98101" value="85 Pike St, Seattle, WA 98101" required>
                </div>
                
                <div class="form-group">
                    <label for="start_time"><i class="fa-regular fa-clock"></i> Start Time</label>
                    <input type="datetime-local" id="start_time" required>
                </div>
                
                <div class="form-group">
                    <label for="end_time"><i class="fa-solid fa-hourglass-end"></i> End Time</label>
                    <input type="datetime-local" id="end_time" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group half">
                        <label for="budget"><i class="fa-solid fa-sack-dollar"></i> Budget ($)</label>
                        <input type="number" id="budget" placeholder="e.g. 100" value="100">
                    </div>
                    <div class="form-group half checkbox-group">
                        <label class="toggle-switch">
                            <input type="checkbox" id="ate_breakfast" checked>
                            <span class="slider round"></span>
                        </label>
                        <span class="toggle-label">Ate Breakfast</span>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary" id="submit-btn">
                    <span>Generate Itinerary</span>
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </button>
            </form>

            <div class="loading-overlay" id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Planning your perfect day...</p>
            </div>
        </aside>

        <!-- Timeline View -->
        <section class="timeline-section glass-panel">
            <header class="timeline-header">
                <h2><i class="fa-solid fa-route"></i> Your Itinerary</h2>
                <div class="trip-stats" id="trip-stats">
                    <!-- Dynamic stats populated by JS -->
                </div>
            </header>
            
            <div class="timeline-container" id="timeline">
                <div class="empty-state">
                    <i class="fa-solid fa-map-location-dot"></i>
                    <p>Enter your preferences and generate a trip to see your smart itinerary.</p>
                </div>
            </div>
        </section>

        <!-- Map View -->
        <main class="map-section">
            <div id="map"></div>
            <div class="map-overlay">
                <span class="badge live-badge">Live Map Preview</span>
                <div class="geocoding-status" id="geo-status" style="display: none;">
                    <i class="fa-solid fa-satellite-dish fa-beat"></i> Locating destinations...
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
